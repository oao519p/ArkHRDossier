<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>幹員卡片測試</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #eee; font-family: monospace; padding: 20px; }
    h2 { color: #f1f5f9; margin-bottom: 8px; font-size: 16px; }
    input[type=file] { color: #eee; margin-bottom: 16px; display: block; }

    /* ── 控制列 ── */
    #controls {
      display: none;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    .ctrl-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ctrl-label {
      font-size: 12px;
      color: #94a3b8;
      min-width: 52px;
    }
    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-group label {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      color: #cbd5e1;
      cursor: pointer;
      padding: 2px 6px;
      border: 1px solid #334155;
      border-radius: 4px;
      user-select: none;
    }
    .filter-group label:hover { border-color: #64748b; }
    .filter-group input[type=checkbox] { accent-color: #60a5fa; }
    .btn-sm {
      font-size: 11px;
      padding: 3px 8px;
      border: 1px solid #475569;
      border-radius: 4px;
      background: #1e293b;
      color: #cbd5e1;
      cursor: pointer;
    }
    .btn-sm:hover { background: #334155; }
    .btn-sm.active { background: #1d4ed8; border-color: #3b82f6; color: #fff; }

    #count-label { font-size: 12px; color: #64748b; }

    /* 玩家資訊列 */
    #player-info {
      display: none;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      flex-wrap: wrap;
    }
    #player-info .pi-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    #player-info .pi-label {
      font-size: 10px;
      color: #64748b;
      line-height: 1;
    }
    #player-info .pi-value {
      font-size: 14px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1;
    }

    /* ── Grid ── */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    /* ── 卡片外框 ── */
    .op-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 120px;
    }

    .op-card {
      position: relative;
      width: 120px;
      border-radius: 6px;
      overflow: hidden;
      background: #1a1a2e;
      border: 1px solid #333;
    }

    .op-card .portrait {
      display: block;
      width: 100%;
      aspect-ratio: 180 / 360;
      object-fit: cover;
      object-position: top center;
    }

    /* 稀有度左側色條 */
    .op-card .rarity-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
    }
    .rarity-6 { background: linear-gradient(to bottom, #ff8c00, #ffd700); }
    .rarity-5 { background: linear-gradient(to bottom, #d4a017, #f0c040); }
    .rarity-4 { background: linear-gradient(to bottom, #7b2fbe, #b06ae9); }
    .rarity-3 { background: linear-gradient(to bottom, #1a6fb5, #4da6ff); }
    .rarity-2 { background: linear-gradient(to bottom, #2e7d32, #66bb6a); }
    .rarity-1 { background: linear-gradient(to bottom, #555, #999); }

    /* 左側縱列：職業 → [精英+等級黑底] */
    .op-card .left-col {
      position: absolute;
      top: 4px; left: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .op-card .prof-icon {
      width: 24px; height: 24px;
      object-fit: contain;
      filter: drop-shadow(0 1px 3px #000);
    }
    /* 精英+等級 黑底膠囊 */
    .op-card .elite-lvl {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      background: rgba(0,0,0,0.55);
      border-radius: 4px;
      padding: 2px 3px;
    }
    .op-card .elite-icon {
      width: 18px; height: 18px;
      object-fit: contain;
    }
    .op-card .level-text {
      font-size: 13px; font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    /* 右上：稀有度 */
    .op-card .top-right {
      position: absolute;
      top: 4px; right: 4px;
    }
    .op-card .rarity-icon {
      height: 14px; width: auto;
      object-fit: contain;
      filter: drop-shadow(0 1px 2px #000);
    }

    /* 下方漸層遮罩 */
    .op-card .bottom-mask {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0) 100%);
      pointer-events: none;
    }

    /* 左下：內嵌名字（內嵌模式） */
    .op-card .inline-name {
      position: absolute;
      bottom: 6px; left: 7px;
      /*right: 26px;*/
      font-size: 11px; font-weight: 600;
      color: #f1f5f9;
      text-shadow: 0 1px 3px #000;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
    }

    /* 右下：潛能 */
    .op-card .bottom-right {
      position: absolute;
      bottom: 1px; right: 4px;
    }
    .op-card .potential-icon {
      width: 18px; height: 18px;
      object-fit: contain;
    }

    /* 技能 & 模組橫排 */
    .op-card .skill-row {
      position: absolute;
      bottom: 26px; left: 8px; right: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 技能格 */
    .skill-wrap {
      position: relative;
      width: 32px; height: 32px;
      flex-shrink: 0;
    }
    .skill-wrap .skill-icon {
      width: 32px; height: 32px;
      object-fit: contain;
      border-radius: 4px;
      background: rgba(0,0,0,0.55);
    }
    .skill-wrap .skill-badge {
      position: absolute;
      top: -3px; left: -3px;
      width: 12px; height: 12px;
      object-fit: contain;
    }
    .skill-wrap .skill-badge-txt {
      position: absolute;
      top: -3px; left: -3px;
      width: 12px; height: 12px;
      background: #000; color: #fff;
      font-size: 9px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      border-radius: 2px; line-height: 1;
    }

    /* 模組格：用 background-image 自適應填滿 */
    .equip-wrap {
      width: 32px; height: 32px;
      flex-shrink: 0;
      border-radius: 4px;
      background-color: rgba(0,0,0,0.55);
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }
    /* all-skills 模式：模組疊在第一個技能格正上方 */
    .equip-wrap.equip-overlay {
      position: absolute;
      bottom: 100%; left: 50%;
      transform: translateX(-50%);
      width: 32px; height: 32px;
      border-radius: 4px;
      background-size: 130%;
      z-index: 2;
      margin-bottom: 2px;
    }
    .equip-wrap.equip-overlay.equip-original {
      background-size: 24px 31px;
    }


    /* 卡片下方名稱（預設模式） */
    .op-name {
      font-size: 11px; color: #ccc;
      text-align: center;
      margin-top: 4px;
      max-width: 120px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .op-name.hidden { display: none; }

    /* ── 淺色模式 ── */
    body.light { background: #f1f5f9; color: #1e293b; }
    body.light .btn-sm { background: #e2e8f0; border-color: #94a3b8; color: #334155; }
    body.light .btn-sm:hover { background: #cbd5e1; }
    body.light .btn-sm.active { background: #1d4ed8; border-color: #3b82f6; color: #fff; }
    body.light #controls { background: transparent; }
    body.light .ctrl-label { color: #64748b; }
    body.light .filter-group label { color: #334155; border-color: #cbd5e1; }
    body.light .filter-group label:hover { border-color: #94a3b8; }
    body.light #player-info { background: #fff; border-color: #cbd5e1; }
    body.light #player-info .pi-label { color: #94a3b8; }
    body.light #player-info .pi-value { color: #1e293b; }
    body.light .op-card { background: #e2e8f0; border-color: #94a3b8; }
    body.light .op-name { color: #334155; }
    body.light #count-label { color: #94a3b8; }
    body.light input[type=text] { background: #fff !important; border-color: #94a3b8 !important; color: #1e293b !important; }
  </style>
</head>
<body>
<h2>🧪 幹員卡片測試</h2>
<input type="file" id="fileInput" accept=".json" />

<div id="player-info">
  <div class="pi-item"><span class="pi-label">UID</span><span class="pi-value" id="pi-uid">—</span></div>
  <div class="pi-item"><span class="pi-label">名稱</span><span class="pi-value" id="pi-name">—</span></div>
  <div class="pi-item"><span class="pi-label">伺服器</span><span class="pi-value" id="pi-channel">—</span></div>
  <div class="pi-item"><span class="pi-label">等級</span><span class="pi-value" id="pi-level">—</span></div>
</div>

<div id="controls">
  <!-- 職業 filter -->
  <div class="ctrl-row">
    <span class="ctrl-label">職業</span>
    <div class="filter-group" id="prof-filter"></div>
    <button class="btn-sm" id="prof-all">全選</button>
    <button class="btn-sm" id="prof-none">取消</button>
  </div>
  <!-- 稀有度 filter -->
  <div class="ctrl-row">
    <span class="ctrl-label">稀有度</span>
    <div class="filter-group" id="rarity-filter"></div>
    <button class="btn-sm" id="rarity-all">全選</button>
    <button class="btn-sm" id="rarity-none">取消</button>
  </div>
  <!-- 搜尋 -->
  <div class="ctrl-row">
    <span class="ctrl-label">搜尋</span>
    <input type="text" id="search-input" placeholder="幹員名稱..." style="font-size:12px;padding:3px 8px;border:1px solid #475569;border-radius:4px;background:#1e293b;color:#cbd5e1;width:160px;" />
    <button class="btn-sm" id="search-clear">✕</button>
  </div>
  <!-- 排序 -->
  <div class="ctrl-row">
    <span class="ctrl-label">排序</span>
    <button class="btn-sm active" id="sort-default" data-sort="default">原始順序</button>
    <button class="btn-sm" id="sort-elite" data-sort="elite">精英化+等級 ↓</button>
    <button class="btn-sm" id="sort-rarity" data-sort="rarity">稀有度 ↓</button>
    <button class="btn-sm" id="sort-prof" data-sort="prof">職業</button>
  </div>
  <!-- 技能切換 -->
  <div class="ctrl-row">
    <span class="ctrl-label">技能</span>
    <button class="btn-sm active" data-skill="default">Default only</button>
    <button class="btn-sm" data-skill="all">All skills</button>
    <button class="btn-sm" data-skill="none">關閉</button>
  </div>
  <!-- 顯示開關 -->
  <div class="ctrl-row">
    <span class="ctrl-label">顯示</span>
    <button class="btn-sm active" data-vis="rarity-bar">稀有度條</button>
    <button class="btn-sm active" data-vis="elite">精英化</button>
    <button class="btn-sm active" data-vis="level">等級</button>
    <button class="btn-sm active" data-vis="skill-badge">技能badge</button>
    <button class="btn-sm active" data-vis="equip">模組</button>
    <button class="btn-sm active" data-vis="rarity-icon">稀有度圖示</button>
    <button class="btn-sm active" data-vis="potential">潛能</button>
  </div>
  <!-- 名字切換 -->
  <div class="ctrl-row">
    <span class="ctrl-label">名字</span>
    <button class="btn-sm" id="name-toggle">顯示在卡片下方</button>
  </div>
  <!-- 色彩模式 -->
  <div class="ctrl-row">
    <span class="ctrl-label">色彩</span>
    <button class="btn-sm active" id="theme-toggle">🌙 深色</button>
  </div>
  <!-- 輸出 -->
  <div class="ctrl-row">
    <span class="ctrl-label">輸出</span>
    <button class="btn-sm" id="export-html">下載 HTML</button>
    <button class="btn-sm" id="export-cards">下載卡片圖片 (ZIP)</button>
    <button class="btn-sm" id="export-pause" style="display:none">⏸ 暫停</button>
    <button class="btn-sm" id="export-cancel" style="display:none">✕ 取消</button>
    <span id="export-status" style="font-size:11px;color:#64748b;"></span>
  </div>
  <!-- 計數 -->
  <div class="ctrl-row">
    <span id="count-label"></span>
  </div>
</div>


<div id="output"></div>

<script>
  const SKILL_NONE     = 'https://static.prts.wiki/charinfo/img/skland/skill_icon_none.png'
  const SKILL_FALLBACK = './image/skchr_svrash_1.png'

  // ── 本地補齊技能圖清單（在 ./image/ 資料夾下，檔名 {skillId}.png）──
  const LOCAL_SKILLS = new Set([
    'skchr_svrash_1',
    'skchr_huang_1',
    'skchr_lessng_1',
    'skchr_savage_1',
    'skchr_midn_1', // special
    'skchr_doberm_1',
    'skchr_bryota_1',
    'skchr_jesica_1',
    'skchr_vigna_1', // special
    'skchr_caper_1',
    'skchr_luton_1',
    'skchr_stward_1',
    'skchr_catap_1', // special
    // 繼續在這裡新增缺失的 skillId...
  ])

  const PROF_LABELS = {
    PIONEER: '先鋒', WARRIOR: '近衛', TANK: '重裝',
    SNIPER: '狙擊', CASTER: '術師', MEDIC: '醫療',
    SUPPORT: '輔助', SPECIAL: '特種'
  }
  const RARITY_LABELS = { 5:'★6', 4:'★5', 3:'★4', 2:'★3', 1:'★2', 0:'★1' }

  // 狀態
  let gData         = null
  let nameInline    = false
  let skillMode = 'default'  // 'default' | 'all' | 'none'
  let exportPaused    = false
  let exportCancelled = false
  let sortMode      = 'default'
  let sortDesc      = false
  let searchQuery   = ''
  const visFlags = {
    'rarity-bar':  true,
    'elite':       true,
    'level':       true,
    'skill-badge': true,
    'equip':       true,
    'rarity-icon': true,
    'potential':   true,
  }

  const PROF_ORDER = ['PIONEER','WARRIOR','TANK','SNIPER','CASTER','MEDIC','SUPPORT','SPECIAL']


  function skinIdToUrl(skinId) {
    if (!skinId) return ''
    let converted
    if (skinId.includes('@')) {
      converted = skinId.replace('@', '_').replace(/#/g, '%23')
    } else {
      converted = skinId.replace(/#/g, '_')
    }
    return `https://torappu.prts.wiki/assets/char_portrait/${converted}.png`
  }

  const rarityIconUrl = r  => `https://torappu.prts.wiki/assets/rarity_icon/rarity_${r}.png`
  const profIconUrl   = p  => `https://torappu.prts.wiki/assets/profession_large_icon/icon_profession_${p.toLowerCase()}_large.png`
  const eliteIconUrl  = e  => `https://torappu.prts.wiki/assets/elite_icon/elite_${e}_large.png`
  const potentialUrl  = r  => `https://torappu.prts.wiki/assets/potential_icon/potential_${r}.png`
  const skillIconUrl  = id => id ? `https://torappu.prts.wiki/assets/skill_icon/skill_icon_${id}.png` : SKILL_NONE
  const specIconUrl   = lv => `https://torappu.prts.wiki/assets/specialized_icon/specialized_tiny_${lv}.png`
  const equipIconUrl  = t  => t ? `https://torappu.prts.wiki/assets/uniequip_direction/${t}.png` : ''

  function mkImg(src, cls, skillId) {
    const img = document.createElement('img')
    img.src = src
    if (cls) img.className = cls
    img.onerror = () => {
      if (skillId && LOCAL_SKILLS.has(skillId)) {
        // 有本地圖就用本地
        img.onerror = () => { img.src = SKILL_FALLBACK; img.style.opacity = '1' }
        img.src = `./image/${skillId}.png`
      } else if (skillId) {
        // CDN 找不到、也不在 LOCAL_SKILLS → 用 fallback
        img.onerror = null
        img.src = SKILL_FALLBACK
        img.style.opacity = '1'
      } else {
        img.style.opacity = '0'
      }
    }
    return img
  }

  function getChecked(groupId) {
    return [...document.querySelectorAll(`#${groupId} input[type=checkbox]:checked`)]
      .map(cb => cb.value)
  }

  function buildFilters(data) {
    const chars       = data.chars       || []
    const charInfoMap = data.charInfoMap || {}

    // 收集實際出現的職業 & 稀有度
    const profs    = new Set()
    const rarities = new Set()
    chars.forEach(c => {
      const info = charInfoMap[c.charId] || {}
      if (info.profession) profs.add(info.profession)
      const r = info.rarity ?? c.rarity ?? 0
      rarities.add(r)
    })

    // 職業 checkboxes（按固定順序）
    const profFilter = document.getElementById('prof-filter')
    profFilter.innerHTML = ''
    Object.keys(PROF_LABELS).forEach(p => {
      if (!profs.has(p)) return
      const lbl = document.createElement('label')
      const cb  = document.createElement('input')
      cb.type = 'checkbox'; cb.value = p; cb.checked = true
      cb.addEventListener('change', rerender)
      lbl.appendChild(cb)
      lbl.appendChild(document.createTextNode(PROF_LABELS[p]))
      profFilter.appendChild(lbl)
    })

    // 稀有度 checkboxes（從高到低）
    const rarityFilter = document.getElementById('rarity-filter')
    rarityFilter.innerHTML = ''
    ;[5,4,3,2,1,0].forEach(r => {
      if (!rarities.has(r)) return
      const lbl = document.createElement('label')
      const cb  = document.createElement('input')
      cb.type = 'checkbox'; cb.value = String(r); cb.checked = true
      cb.addEventListener('change', rerender)
      lbl.appendChild(cb)
      lbl.appendChild(document.createTextNode(RARITY_LABELS[r]))
      rarityFilter.appendChild(lbl)
    })

    document.getElementById('controls').style.display = 'flex'
  }

  function rerender() {
    if (!gData) return
    const allowedProfs    = new Set(getChecked('prof-filter'))
    const allowedRarities = new Set(getChecked('rarity-filter').map(Number))
    renderGrid(gData, allowedProfs, allowedRarities, searchQuery, sortMode)
  }

  function renderGrid(data, allowedProfs, allowedRarities, searchQuery, sortMode) {
    const out = document.getElementById('output')
    out.innerHTML = ''

    const chars        = data.chars        || []
    const charInfoMap  = data.charInfoMap  || {}
    const equipInfoMap = data.equipmentInfoMap || data.equipInfoMap || {}

    // 過濾
    const q = (searchQuery || '').trim().toLowerCase()
    let filtered = chars.filter(c => {
      const info   = charInfoMap[c.charId] || {}
      const rarity = info.rarity ?? c.rarity ?? 0
      const prof   = info.profession || 'PIONEER'
      if (!allowedProfs.has(prof))      return false
      if (!allowedRarities.has(rarity)) return false
      if (q) {
        const name = (info.name || c.charId).toLowerCase()
        if (!name.includes(q)) return false
      }
      return true
    })

    // 排序
    const d = sortDesc ? -1 : 1
    // 記錄原始索引供 default 排序用
    const origIndex = new Map(chars.map((c, i) => [c.charId + c.skinId, i]))
    filtered.sort((a, b) => {
      const ia = charInfoMap[a.charId] || {}
      const ib = charInfoMap[b.charId] || {}
      if (sortMode === 'default') {
        const oa = origIndex.get(a.charId + a.skinId) ?? 0
        const ob = origIndex.get(b.charId + b.skinId) ?? 0
        return (oa - ob) * d
      }
      if (sortMode === 'rarity') {
        const ra = ia.rarity ?? a.rarity ?? 0
        const rb = ib.rarity ?? b.rarity ?? 0
        return (rb - ra) * d
      }
      if (sortMode === 'prof') {
        const pa = PROF_ORDER.indexOf(ia.profession || 'PIONEER')
        const pb = PROF_ORDER.indexOf(ib.profession || 'PIONEER')
        if (pa !== pb) return (pa - pb) * d
        // 同職業內固定按精英化+等級降序
        if (b.evolvePhase !== a.evolvePhase) return b.evolvePhase - a.evolvePhase
        return b.level - a.level
      }
      // elite：精英化 → 等級
      if (b.evolvePhase !== a.evolvePhase) return (b.evolvePhase - a.evolvePhase) * d
      return (b.level - a.level) * d
    })

    const grid = document.createElement('div')
    grid.className = 'grid'

    let shown = 0
    filtered.forEach(c => {
      const info   = charInfoMap[c.charId] || {}
      const rarity = info.rarity ?? c.rarity ?? 0
      const prof   = info.profession || 'PIONEER'

      shown++

      const defaultSkillId = c.defaultSkillId || ''
      const defaultEquipId = c.defaultEquipId || ''
      const equipInfo      = equipInfoMap[defaultEquipId] || {}
      const typeIcon       = equipInfo.typeIcon || ''

      const mainSkillLvl = c.mainSkillLvl || 0
      let specLevel = 0
      if (mainSkillLvl === 7 && c.skills && defaultSkillId) {
        const sk = c.skills.find(s => s.id === defaultSkillId)
        if (sk) specLevel = sk.specializeLevel || 0
      }

      // ── 建卡片 ──
      const wrap = document.createElement('div')
      wrap.className = 'op-wrap'

      const card = document.createElement('div')
      card.className = 'op-card'

      card.appendChild(mkImg(skinIdToUrl(c.skinId), 'portrait'))

      if (visFlags['rarity-bar']) {
        const bar = document.createElement('div')
        bar.className = `rarity-bar rarity-${rarity + 1}`
        card.appendChild(bar)
      }

      // 左側縱列：職業 → [精英+等級黑底]
      const leftCol = document.createElement('div')
      leftCol.className = 'left-col'
      leftCol.appendChild(mkImg(profIconUrl(prof), 'prof-icon'))
      if (visFlags['elite'] || visFlags['level']) {
        const eliteLvl = document.createElement('div')
        eliteLvl.className = 'elite-lvl'
        if (visFlags['elite']) {
          eliteLvl.appendChild(mkImg(eliteIconUrl(c.evolvePhase), 'elite-icon'))
        }
        if (visFlags['level']) {
          const lvTxt = document.createElement('span')
          lvTxt.className = 'level-text'
          lvTxt.textContent = c.level
          eliteLvl.appendChild(lvTxt)
        }
        leftCol.appendChild(eliteLvl)
      }
      card.appendChild(leftCol)

      // 右上：稀有度圖示
      if (visFlags['rarity-icon']) {
        const topRight = document.createElement('div')
        topRight.className = 'top-right'
        topRight.appendChild(mkImg(rarityIconUrl(rarity), 'rarity-icon'))
        card.appendChild(topRight)
      }

      const mask = document.createElement('div')
      mask.className = 'bottom-mask'
      card.appendChild(mask)

      // 技能 & 模組橫排
      const skillRow = document.createElement('div')
      skillRow.className = 'skill-row'

      function mkEquipWrap(overlay) {
        if (!typeIcon) return null
        const ew = document.createElement('div')
        ew.className = overlay
          ? `equip-wrap equip-overlay${typeIcon === 'original' ? ' equip-original' : ''}`
          : 'equip-wrap'
        ew.style.backgroundImage = `url('${equipIconUrl(typeIcon)}')`
        if (!overlay) ew.style.backgroundSize = typeIcon === 'original' ? '24px 31px' : '130%'
        return ew
      }

      if (skillMode === 'none') {
        // 技能關閉：不渲染 skill-row
      } else if (skillMode !== 'all') {
        // ── default only：1 技能 + 模組並排 ──
        const sw = document.createElement('div')
        sw.className = 'skill-wrap'
        sw.appendChild(mkImg(skillIconUrl(defaultSkillId), 'skill-icon', defaultSkillId || null))
        if (defaultSkillId && visFlags['skill-badge']) {
          if (specLevel >= 1) {
            sw.appendChild(mkImg(specIconUrl(specLevel), 'skill-badge'))
          } else {
            const badge = document.createElement('div')
            badge.className = 'skill-badge-txt'
            badge.textContent = mainSkillLvl || ''
            sw.appendChild(badge)
          }
        }
        skillRow.appendChild(sw)
        if (visFlags['equip']) {
          const ew = mkEquipWrap(false)
          if (ew) skillRow.appendChild(ew)
        }

      } else if (skillMode === 'all') {
        // ── all skills：顯示全部技能，模組疊在第一格右下角 ──
        const skills = (c.skills && c.skills.length) ? c.skills : []
        skills.forEach((sk, idx) => {
          const sw = document.createElement('div')
          sw.className = 'skill-wrap'
          sw.style.position = 'relative'
          sw.appendChild(mkImg(skillIconUrl(sk.id), 'skill-icon', sk.id))

          // badge：專精 or 等級
          const isDefault = sk.id === defaultSkillId
          const skSpec = sk.specializeLevel || 0
          if (visFlags['skill-badge']) {
            if (skSpec >= 1) {
              sw.appendChild(mkImg(specIconUrl(skSpec), 'skill-badge'))
            } else {
              const badge = document.createElement('div')
              badge.className = 'skill-badge-txt'
              badge.textContent = mainSkillLvl || ''
              sw.appendChild(badge)
            }
          }

          // 模組疊在第一個技能格正上方
          if (idx === 0 && visFlags['equip']) {
            const ew = mkEquipWrap(true)
            if (ew) sw.appendChild(ew)
          }

          skillRow.appendChild(sw)
        })

        // 若 skills 為空，仍顯示 skill_none
        if (!skills.length) {
          const sw = document.createElement('div')
          sw.className = 'skill-wrap'
          sw.appendChild(mkImg(SKILL_NONE, 'skill-icon'))
          const ew = mkEquipWrap(true)
          if (ew) sw.appendChild(ew)
          skillRow.appendChild(sw)
        }
      }

      if (skillMode !== 'none') card.appendChild(skillRow)

      // 左下：內嵌名字（內嵌模式）
      if (nameInline) {
        const inName = document.createElement('div')
        inName.className = 'inline-name'
        inName.textContent = info.name || c.charId
        card.appendChild(inName)
      }

      // 底部右：潛能
      if (visFlags['potential']) {
        const br = document.createElement('div')
        br.className = 'bottom-right'
        br.appendChild(mkImg(potentialUrl(c.potentialRank), 'potential-icon'))
        card.appendChild(br)
      }

      wrap.appendChild(card)

      // 卡片下方名稱
      const nameEl = document.createElement('div')
      nameEl.className = nameInline ? 'op-name hidden' : 'op-name'
      nameEl.textContent = info.name || c.charId
      wrap.appendChild(nameEl)

      grid.appendChild(wrap)
    })

    out.appendChild(grid)
    document.getElementById('count-label').textContent =
      `顯示 ${shown} / ${chars.length} 位幹員`
  }

  function showPlayerInfo(data) {
    const meta   = data._meta   || {}
    const status = data.status  || {}
    const uid     = meta.uid        || status.uid  || '—'
    const name    = meta.nickName   || status.name || '—'
    const channel = meta.channelName || '—'
    const level   = status.level    || '—'
    document.getElementById('pi-uid').textContent     = uid
    document.getElementById('pi-name').textContent    = name
    document.getElementById('pi-channel').textContent = channel
    document.getElementById('pi-level').textContent   = level
    document.getElementById('player-info').style.display = 'flex'
  }

  function getPlayerUid() {
    return (gData?._meta?.uid || gData?.status?.uid || 'unknown')
  }

  // ── 事件綁定 ──
  document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0]
    if (!file) return
    const reader = new FileReader()
    reader.onload = ev => {
      try {
        gData = JSON.parse(ev.target.result)
        showPlayerInfo(gData)
        buildFilters(gData)
        rerender()
      } catch(err) {
        document.getElementById('output').innerHTML =
          `<p style="color:red">解析失敗: ${err.message}</p>`
      }
    }
    reader.readAsText(file)
  })

  // ── 顯示開關 ──
  document.querySelectorAll('[data-vis]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.vis
      visFlags[key] = !visFlags[key]
      btn.classList.toggle('active', visFlags[key])
      rerender()
    })
  })

  // ── 搜尋 ──
  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value
    rerender()
  })
  document.getElementById('search-clear').addEventListener('click', () => {
    searchQuery = ''
    document.getElementById('search-input').value = ''
    rerender()
  })

  // ── 排序 ──
  const SORT_LABELS = {
    default:['原始順序',       '原始順序 ↑'],
    elite:  ['精英化+等級 ↓', '精英化+等級 ↑'],
    rarity: ['稀有度 ↓',      '稀有度 ↑'],
    prof:   ['職業 ↓',        '職業 ↑'],
  }
  function updateSortBtns() {
    document.querySelectorAll('[data-sort]').forEach(b => {
      const isActive = b.dataset.sort === sortMode
      b.classList.toggle('active', isActive)
      b.textContent = SORT_LABELS[b.dataset.sort][isActive && !sortDesc ? 1 : 0]
    })
  }
  document.querySelectorAll('[data-sort]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.sort === sortMode) {
        sortDesc = !sortDesc   // 同按鈕再點：切換升/降
      } else {
        sortMode = btn.dataset.sort
        sortDesc = false       // 換按鈕：重置為升序
      }
      updateSortBtns()
      rerender()
    })
  })

  document.getElementById('prof-all').addEventListener('click', () => {
    document.querySelectorAll('#prof-filter input').forEach(cb => cb.checked = true)
    rerender()
  })
  document.getElementById('prof-none').addEventListener('click', () => {
    document.querySelectorAll('#prof-filter input').forEach(cb => cb.checked = false)
    rerender()
  })
  document.getElementById('rarity-all').addEventListener('click', () => {
    document.querySelectorAll('#rarity-filter input').forEach(cb => cb.checked = true)
    rerender()
  })
  document.getElementById('rarity-none').addEventListener('click', () => {
    document.querySelectorAll('#rarity-filter input').forEach(cb => cb.checked = false)
    rerender()
  })

  // ── 輸出 HTML ──
  document.getElementById('export-html').addEventListener('click', () => {
    const gridHtml = document.getElementById('output').innerHTML
    if (!gridHtml) return
    const styleEl = document.querySelector('style')
    const css = styleEl ? styleEl.innerHTML : ''
    const uid     = document.getElementById('pi-uid').textContent
    const name    = document.getElementById('pi-name').textContent
    const channel = document.getElementById('pi-channel').textContent
    const level   = document.getElementById('pi-level').textContent
    const playerBar = `<div style="display:flex;gap:24px;margin-bottom:16px;padding:8px 12px;background:#1e293b;border:1px solid #334155;border-radius:6px;flex-wrap:wrap;">
  <div><div style="font-size:10px;color:#64748b">UID</div><div style="font-size:14px;font-weight:700;color:#f1f5f9">${uid}</div></div>
  <div><div style="font-size:10px;color:#64748b">名稱</div><div style="font-size:14px;font-weight:700;color:#f1f5f9">${name}</div></div>
  <div><div style="font-size:10px;color:#64748b">伺服器</div><div style="font-size:14px;font-weight:700;color:#f1f5f9">${channel}</div></div>
  <div><div style="font-size:10px;color:#64748b">等級</div><div style="font-size:14px;font-weight:700;color:#f1f5f9">${level}</div></div>
</div>`
    const html = `<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>幹員卡片 - ${name} (${uid})</title>
<style>${css}</style>
</head>
<body style="background:#111;padding:20px;">
${playerBar}
${gridHtml}
</body>
</html>`
    const blob = new Blob([html], { type: 'text/html' })
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    a.download = `operator_cards_${uid}.html`
    a.click()
  })

  // ── 輸出個別卡片圖片 (ZIP) ──
  document.getElementById('export-cards').addEventListener('click', async () => {
    const cards = [...document.querySelectorAll('.op-card')]
    if (!cards.length) return
    const statusEl   = document.getElementById('export-status')
    const btnPause   = document.getElementById('export-pause')
    const btnCancel  = document.getElementById('export-cancel')
    const btnExport  = document.getElementById('export-cards')

    exportPaused    = false
    exportCancelled = false
    btnPause.style.display  = ''
    btnCancel.style.display = ''
    btnExport.disabled = true
    statusEl.textContent = '載入中...'

    async function loadScript(src) {
      return new Promise((res, rej) => {
        if (document.querySelector(`script[src="${src}"]`)) return res()
        const s = document.createElement('script')
        s.src = src; s.onload = res; s.onerror = rej
        document.head.appendChild(s)
      })
    }
    try {
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js')
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js')
    } catch(e) {
      statusEl.textContent = '載入函式庫失敗，請確認網路連線'
      btnPause.style.display = btnCancel.style.display = 'none'
      btnExport.disabled = false
      return
    }

    const zip = new JSZip()
    const uid = getPlayerUid()

    for (let i = 0; i < cards.length; i++) {
      // 等待暫停解除
      while (exportPaused && !exportCancelled) {
        await new Promise(r => setTimeout(r, 200))
      }
      if (exportCancelled) {
        statusEl.textContent = '已取消'
        break
      }

      const card   = cards[i]
      const wrap   = card.closest('.op-wrap')
      const nameEl = wrap?.querySelector('.op-name')
      const name   = (nameEl?.textContent || `card_${i + 1}`).trim().replace(/[\\/:*?"<>|]/g, '_')
      statusEl.textContent = `處理中 ${i + 1} / ${cards.length}　${name}`
      try {
        const canvas = await html2canvas(card, {
          useCORS: true, allowTaint: false, scale: 2, backgroundColor: null
        })
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'))
        zip.file(`${String(i + 1).padStart(3, '0')}_${name}.png`, blob)
      } catch(e) {
        console.warn('卡片截圖失敗:', name, e)
      }
    }

    btnPause.style.display = btnCancel.style.display = 'none'
    btnExport.disabled = false

    if (!exportCancelled) {
      statusEl.textContent = '打包中...'
      const zipBlob = await zip.generateAsync({ type: 'blob' })
      const a = document.createElement('a')
      a.href = URL.createObjectURL(zipBlob)
      a.download = `operator_cards_${uid}.zip`
      a.click()
      statusEl.textContent = `完成，共 ${cards.length} 張`
    }
  })

  document.getElementById('export-pause').addEventListener('click', () => {
    exportPaused = !exportPaused
    document.getElementById('export-pause').textContent = exportPaused ? '▶ 繼續' : '⏸ 暫停'
  })

  document.getElementById('export-cancel').addEventListener('click', () => {
    exportCancelled = true
    exportPaused    = false
  })

  document.querySelectorAll('[data-skill]').forEach(btn => {
    btn.addEventListener('click', () => {
      skillMode = btn.dataset.skill
      document.querySelectorAll('[data-skill]').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      rerender()
    })
  })

  updateSortBtns()

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const btn = document.getElementById('theme-toggle')
    const isLight = document.body.classList.toggle('light')
    btn.textContent = isLight ? '☀️ 淺色' : '🌙 深色'
    btn.classList.toggle('active', !isLight)
  })

  document.getElementById('name-toggle').addEventListener('click', () => {
    nameInline = !nameInline
    const btn = document.getElementById('name-toggle')
    btn.textContent = nameInline ? '顯示在卡片內嵌' : '顯示在卡片下方'
    btn.classList.toggle('active', nameInline)
    rerender()
  })
</script>
</body>
</html>
